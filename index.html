<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orquestrador do Crispim</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orquestrador do Crispim">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.1);
    --text: #e8e8e8;
    --muted: #555;
    --error: #ff4444;
    --warn: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .status-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .status-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.warn { background: var(--warn); }

  .btn-settings {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  /* SETUP PANEL */
  #setup-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }

  .setup-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
  }

  .setup-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .setup-subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  /* CHAT AREA */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 100%;
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    flex-shrink: 0;
  }

  .msg.user .msg-avatar { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
  .msg.agent .msg-avatar { background: #1a1a1a; color: var(--muted); border: 1px solid var(--border); }

  .msg-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    max-width: calc(100% - 44px);
    line-height: 1.6;
    font-size: 13px;
  }

  .msg.user .msg-content {
    background: var(--accent-dim);
    border-color: rgba(0,255,136,0.2);
    color: var(--text);
  }

  .msg-content pre {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    overflow-x: auto;
    margin: 8px 0;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .msg-content code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: #0d0d0d;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }

  /* ACTIONS dentro da mensagem */
  .action-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .action-item .icon { font-size: 13px; }
  .action-item.done { color: var(--accent); }
  .action-item.running { color: var(--warn); }
  .action-item.error { color: var(--error); }

  .link-result {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 12px;
    background: var(--accent);
    color: #000;
    border-radius: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
  }

  /* TYPING */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-indicator span {
    width: 5px; height: 5px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  /* INPUT AREA */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
    background: var(--bg);
  }

  .quick-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .quick-actions::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 42px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }

  .hidden { display: none !important; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .welcome h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .welcome p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">▸ ORQUESTRADOR DO CRISPIM</div>
  <div class="status-bar">
    <div class="status-dot" id="groq-dot"></div>
    <div class="status-dot" id="gh-dot"></div>
    <div class="status-dot" id="render-dot"></div>
    <button class="btn-settings" onclick="openSetup()">⚙ config</button>
  </div>
</header>

<!-- SETUP PANEL -->
<div id="setup-panel">
  <div class="setup-box">
    <div class="setup-title">// configuração inicial</div>
    <div class="setup-subtitle">Introduz as tuas chaves uma vez. Ficam guardadas localmente no browser.</div>

    <div class="field">
      <label>Groq API Key</label>
      <input type="password" id="groq-key" placeholder="gsk_..." />
    </div>
    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="gh-token" placeholder="ghp_..." />
    </div>
    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="gh-user" placeholder="o teu username" />
    </div>
    <div class="field">
      <label>Render API Key</label>
      <input type="password" id="render-key" placeholder="rnd_..." />
    </div>

    <button class="btn-save" onclick="saveConfig()">Guardar e começar →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="welcome" id="welcome-msg">
    <h2>Orquestrador do Crispim, pronto.</h2>
    <p>Diz o que queres criar.<br>O orquestrador trata do resto.</p>
  </div>
</div>

<!-- INPUT -->
<div id="input-area">
  <div class="quick-actions">
    <div class="chip" onclick="quickSend('Cria um site de restaurante moderno')">🍽 restaurante</div>
    <div class="chip" onclick="quickSend('Cria uma landing page para um negócio de beleza')">💅 beleza</div>
    <div class="chip" onclick="quickSend('Cria um portfolio pessoal minimalista')">👤 portfolio</div>
    <div class="chip" onclick="quickSend('Cria uma landing page para uma startup de tech')">🚀 startup</div>
    <div class="chip" onclick="quickSend('Cria um site para uma clínica médica')">🏥 clínica</div>
    <div class="chip" onclick="quickSend('Lista os meus repositórios no GitHub')">📁 repos</div>
    <div class="chip" onclick="quickSend('Lista os meus serviços no Render')">🚀 render</div>
    <div class="chip" onclick="quickSend('Apaga os repositórios que eu te indicar')">🗑 apagar repo</div>
  </div>
  <div class="input-row">
    <textarea id="user-input" placeholder="Ex: cria um site de restaurante com menu e reservas..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
let config = {};

function loadConfig() {
  try {
    const saved = localStorage.getItem('crispim_config');
    if (saved) {
      config = JSON.parse(saved);
      if (config.groqKey) document.getElementById('groq-key').value = config.groqKey;
      if (config.ghToken) document.getElementById('gh-token').value = config.ghToken;
      if (config.ghUser) document.getElementById('gh-user').value = config.ghUser;
      if (config.renderKey) document.getElementById('render-key').value = config.renderKey;
      updateDots();
      if (config.groqKey && config.ghToken && config.ghUser && config.renderKey) {
        document.getElementById('setup-panel').classList.add('hidden');
      }
    }
  } catch(e) {}
}

function saveConfig() {
  config = {
    groqKey: document.getElementById('groq-key').value.trim(),
    ghToken: document.getElementById('gh-token').value.trim(),
    ghUser: document.getElementById('gh-user').value.trim(),
    renderKey: document.getElementById('render-key').value.trim(),
  };
  if (!config.groqKey || !config.ghToken || !config.ghUser || !config.renderKey) {
    alert('Preenche todos os campos.');
    return;
  }
  localStorage.setItem('crispim_config', JSON.stringify(config));
  updateDots();
  document.getElementById('setup-panel').classList.add('hidden');
}

function openSetup() {
  document.getElementById('setup-panel').classList.remove('hidden');
}

function updateDots() {
  document.getElementById('groq-dot').className = 'status-dot' + (config.groqKey ? ' ok' : ' warn');
  document.getElementById('gh-dot').className = 'status-dot' + (config.ghToken ? ' ok' : ' warn');
  document.getElementById('render-dot').className = 'status-dot' + (config.renderKey ? ' ok' : ' warn');
}

// ─── CHAT HISTORY ─────────────────────────────────────────
let chatHistory = [];

// ─── UI HELPERS ───────────────────────────────────────────
function appendMsg(role, html) {
  document.getElementById('welcome-msg')?.remove();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? 'TU' : 'CR';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-content">${html}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector('.msg-content');
}

function appendTyping() {
  document.getElementById('welcome-msg')?.remove();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar">CR</div>
    <div class="msg-content">
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-msg')?.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

// ─── GROQ ─────────────────────────────────────────────────
async function callGroq(messages) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${config.groqKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'llama3-8b-8192',
      messages,
      temperature: 0.7,
      max_tokens: 4000
    })
  });
  if (!res.ok) throw new Error('Groq error: ' + res.status);
  const data = await res.json();
  return data.choices[0].message.content;
}

// ─── GITHUB ───────────────────────────────────────────────
async function githubCreate(repoName) {
  const res = await fetch('https://api.github.com/user/repos', {
    method: 'POST',
    headers: {
      'Authorization': `token ${config.ghToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ name: repoName, private: false, auto_init: false })
  });
  if (!res.ok && res.status !== 422) throw new Error('GitHub create failed: ' + res.status);
  return `https://github.com/${config.ghUser}/${repoName}`;
}

async function githubPush(repoName, filename, content) {
  const encoded = btoa(unescape(encodeURIComponent(content)));
  // Check if file exists
  let sha = undefined;
  try {
    const check = await fetch(`https://api.github.com/repos/${config.ghUser}/${repoName}/contents/${filename}`, {
      headers: { 'Authorization': `token ${config.ghToken}` }
    });
    if (check.ok) {
      const d = await check.json();
      sha = d.sha;
    }
  } catch(e) {}

  const body = { message: 'deploy via orquestrador do crispim', content: encoded };
  if (sha) body.sha = sha;

  const res = await fetch(`https://api.github.com/repos/${config.ghUser}/${repoName}/contents/${filename}`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${config.ghToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('GitHub push failed: ' + res.status);
}

async function listRepos() {
  const res = await fetch('https://api.github.com/user/repos?per_page=20&sort=updated', {
    headers: { 'Authorization': `token ${config.ghToken}` }
  });
  if (!res.ok) throw new Error('GitHub list failed');
  return await res.json();
}

// ─── RENDER ───────────────────────────────────────────────
async function renderDeploy(repoName, serviceName) {
  const repoUrl = `https://github.com/${config.ghUser}/${repoName}`;

  // Check existing services
  const listRes = await fetch('https://api.render.com/v1/services?limit=20', {
    headers: { 'Authorization': `Bearer ${config.renderKey}` }
  });

  if (listRes.ok) {
    const listData = await listRes.json();
    const existing = listData.find(item => item.service?.name === serviceName);
    if (existing) {
      // Trigger redeploy
      const deployRes = await fetch(`https://api.render.com/v1/services/${existing.service.id}/deploys`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${config.renderKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ clearCache: 'do_not_clear' })
      });
      return existing.service.serviceDetails?.url || `https://${serviceName}.onrender.com`;
    }
  }

  // Create new static site
  const res = await fetch('https://api.render.com/v1/services', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${config.renderKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      type: 'static_site',
      name: serviceName,
      ownerId: null,
      repo: repoUrl,
      branch: 'main',
      serviceDetails: {
        publishPath: '/',
        pullRequestPreviewsEnabled: false,
        buildCommand: ''
      }
    })
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error('Render deploy failed: ' + err);
  }
  const data = await res.json();
  return data.serviceDetails?.url || `https://${serviceName}.onrender.com`;
}

// ─── SYSTEM PROMPT ────────────────────────────────────────
const SYSTEM_PROMPT = `És o Orquestrador do Crispim — um agente de deploy web com acesso total ao GitHub e Render do utilizador via API. Podes criar sites, fazer deploy, listar repositórios, apagar repositórios e gerir serviços.

IMPORTANTE: Tens acesso real ao GitHub e Render do utilizador. Quando pedido, AGES — não explicas como fazer manualmente.

Responde SEMPRE com JSON válido (sem markdown, sem texto antes ou depois). Escolhe a action correcta:

1. CRIAR E DEPLOYAR SITE:
{"action":"deploy","repoName":"nome-sem-espacos","siteName":"nome-render","html":"...HTML completo..."}

2. LISTAR REPOSITÓRIOS:
{"action":"list_repos"}

3. APAGAR REPOSITÓRIO(S):
{"action":"delete_repos","repos":["nome-repo-1","nome-repo-2"]}

4. LISTAR SERVIÇOS NO RENDER:
{"action":"list_render"}

5. RESPOSTA DE TEXTO (para perguntas gerais):
{"action":"text","message":"a tua resposta aqui"}

Regras para o HTML:
- Ficheiro único completo (inline CSS e JS)
- Profissional, moderno e responsivo
- Conteúdo real e relevante
- Sem dependências externas excepto Google Fonts

Responde sempre em português.`;

// ─── MAIN SEND ────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  if (!config.groqKey) { openSetup(); return; }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', escapeHtml(text));
  appendTyping();

  chatHistory.push({ role: 'user', content: text });

  try {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...chatHistory
    ];

    const reply = await callGroq(messages);
    chatHistory.push({ role: 'assistant', content: reply });

    removeTyping();

    // Try to parse as action
    let parsed = null;
    try {
      const clean = reply.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(e) {}

    if (parsed && parsed.action === 'deploy') {
      await handleDeploy(parsed);
    } else if (parsed && parsed.action === 'list_repos') {
      await handleListRepos();
    } else if (parsed && parsed.action === 'delete_repos') {
      await handleDeleteRepos(parsed.repos || []);
    } else if (parsed && parsed.action === 'list_render') {
      await handleListRender();
    } else if (parsed && parsed.action === 'text') {
      appendMsg('agent', formatText(parsed.message || reply));
    } else {
      appendMsg('agent', formatText(reply));
    }

  } catch(e) {
    removeTyping();
    appendMsg('agent', `<span style="color:var(--error)">Erro: ${escapeHtml(e.message)}</span>`);
  }

  document.getElementById('send-btn').disabled = false;
}

async function handleDeploy(parsed) {
  const bubble = appendMsg('agent', '');
  const repoName = parsed.repoName || 'site-' + Date.now();
  const siteName = parsed.siteName || repoName;

  const steps = [
    { id: 'gen', label: 'Código gerado' },
    { id: 'repo', label: `Criar repo: ${repoName}` },
    { id: 'push', label: 'Push index.html' },
    { id: 'render', label: 'Deploy no Render' },
  ];

  function renderSteps(activeId, doneIds, errorId) {
    return steps.map(s => {
      let cls = 'action-item';
      let icon = '○';
      if (doneIds.includes(s.id)) { cls += ' done'; icon = '✓'; }
      else if (s.id === activeId) { cls += ' running'; icon = '◌'; }
      else if (s.id === errorId) { cls += ' error'; icon = '✕'; }
      return `<div class="${cls}"><span class="icon">${icon}</span>${s.label}</div>`;
    }).join('');
  }

  const done = [];

  try {
    // Step 1 - already done
    done.push('gen');
    bubble.innerHTML = renderSteps('repo', done, null);
    await githubCreate(repoName);

    done.push('repo');
    bubble.innerHTML = renderSteps('push', done, null);
    await githubPush(repoName, 'index.html', parsed.html);

    done.push('push');
    bubble.innerHTML = renderSteps('render', done, null);

    let url;
    try {
      url = await renderDeploy(repoName, siteName);
      done.push('render');
    } catch(renderErr) {
      // Render failed but site is on GitHub Pages
      done.push('render');
      url = `https://${config.ghUser}.github.io/${repoName}`;
    }

    bubble.innerHTML = renderSteps(null, done, null) +
      `<div style="margin-top:10px;font-size:12px;color:var(--muted)">GitHub: <a href="https://github.com/${config.ghUser}/${repoName}" target="_blank" style="color:var(--accent)">github.com/${config.ghUser}/${repoName}</a></div>` +
      `<a href="${url}" target="_blank" class="link-result">▸ Ver site ao vivo</a>`;

  } catch(e) {
    const failedStep = done.length === 0 ? 'gen' : steps[done.length]?.id;
    bubble.innerHTML = renderSteps(null, done, failedStep) +
      `<div style="margin-top:8px;color:var(--error);font-size:12px">Erro: ${escapeHtml(e.message)}</div>`;
  }

  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

async function handleListRepos() {
  const bubble = appendMsg('agent', '<div style="color:var(--muted);font-size:12px">A carregar repositórios...</div>');
  try {
    const repos = await listRepos();
    if (!repos.length) {
      bubble.innerHTML = 'Não encontrei repositórios.';
      return;
    }
    let html = '<div style="font-size:12px;margin-bottom:6px;color:var(--muted)">Os teus repositórios:</div>';
    repos.forEach(r => {
      html += `<div style="padding:4px 0;border-bottom:1px solid var(--border)">
        <a href="${r.html_url}" target="_blank" style="color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:12px">${r.name}</a>
        <span style="color:var(--muted);font-size:11px;margin-left:8px">${r.description || ''}</span>
      </div>`;
    });
    bubble.innerHTML = html;
  } catch(e) {
    bubble.innerHTML = `<span style="color:var(--error)">Erro ao listar repos: ${escapeHtml(e.message)}</span>`;
  }
}

async function handleDeleteRepos(repos) {
  if (!repos.length) {
    appendMsg('agent', '<span style="color:var(--warn)">Nenhum repositório especificado para apagar.</span>');
    return;
  }
  const bubble = appendMsg('agent', '');
  let html = `<div style="font-size:12px;margin-bottom:8px;color:var(--muted)">A apagar ${repos.length} repositório(s)...</div>`;
  bubble.innerHTML = html;

  const results = [];
  for (const repo of repos) {
    try {
      const res = await fetch(`https://api.github.com/repos/${config.ghUser}/${repo}`, {
        method: 'DELETE',
        headers: { 'Authorization': `token ${config.ghToken}` }
      });
      if (res.status === 204) {
        results.push({ repo, ok: true });
      } else {
        results.push({ repo, ok: false, err: 'Status ' + res.status });
      }
    } catch(e) {
      results.push({ repo, ok: false, err: e.message });
    }
  }

  html = `<div style="font-size:12px;margin-bottom:8px;color:var(--muted)">Resultado:</div>`;
  results.forEach(r => {
    if (r.ok) {
      html += `<div class="action-item done"><span class="icon">✓</span>${escapeHtml(r.repo)} apagado</div>`;
    } else {
      html += `<div class="action-item error"><span class="icon">✕</span>${escapeHtml(r.repo)} — ${escapeHtml(r.err)}</div>`;
    }
  });
  bubble.innerHTML = html;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

async function handleListRender() {
  const bubble = appendMsg('agent', '<div style="color:var(--muted);font-size:12px">A carregar serviços Render...</div>');
  try {
    const res = await fetch('https://api.render.com/v1/services?limit=20', {
      headers: { 'Authorization': `Bearer ${config.renderKey}` }
    });
    if (!res.ok) throw new Error('Status ' + res.status);
    const data = await res.json();
    if (!data.length) { bubble.innerHTML = 'Nenhum serviço encontrado no Render.'; return; }
    let html = `<div style="font-size:12px;margin-bottom:6px;color:var(--muted)">Serviços no Render:</div>`;
    data.forEach(item => {
      const s = item.service || item;
      const url = s.serviceDetails?.url || '';
      html += `<div style="padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:12px">${escapeHtml(s.name || '')}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:6px">${escapeHtml(s.type || '')}</span>
        ${url ? `<br><a href="${url}" target="_blank" style="color:var(--muted);font-size:11px">${url}</a>` : ''}
      </div>`;
    });
    bubble.innerHTML = html;
  } catch(e) {
    bubble.innerHTML = `<span style="color:var(--error)">Erro: ${escapeHtml(e.message)}</span>`;
  }
}

// ─── UTILS ────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(text) {
  return escapeHtml(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}
